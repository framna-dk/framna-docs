version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      react:
        patterns:
          - "react"
          - "react-*"
          - "next"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      next-typescript-eslint:
        patterns:
          - "eslint"
          - "eslint-config-next"
          - "typescript"
          - "typescript-eslint"
          - "@typescript-eslint/*"
      everything-else:
        patterns:
          - "*"
        exclude-patterns:
          - "react"
          - "react-*"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
          - "eslint"
          - "eslint-config-next"
          - "typescript"
          - "typescript-eslint"
          - "@typescript-eslint/*"
